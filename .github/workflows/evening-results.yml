name: Signal 75 — Evening Results

on:
  schedule:
    # 18:00 UTC = 7:00 PM BST / 6:00 PM GMT
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Update results
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update-results.py

      - name: Commit updated results to repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Signal 75 Bot"
          git add picks.json
          git diff --staged --quiet || git commit -m "📊 Auto results — $(date '+%d %b %Y %H:%M')"
          git push
